env_variables:

  # For cron tasks
  SLACK_BOT_USER_OAUTH_TOKEN: xoxb-xxxxxxxxxxxxxxxxxxxxxx
  GOOGLE_SERVICE_ACCOUNT_JSON: |
    {"type":"service_account","project_id":"your-project","client_id":"123456789"}
  GOOGLE_CALENDAR_ID: xxxxxxxxxx@group.calendar.google.com

  # For OpenID user oauth steps
  SLACK_CLIENT_ID: "11111111222222222223333333333.4444444445555555"
  SLACK_CLIENT_SECRET: xxxxxxxxxxxxxxxxxxxxxx
  SLACK_INSTALLED_TEAM_ID: TXXXXXXXXX
  SLACK_BOT_EVENTS_VERIFICATION_TOKEN: ABCDEFGHIJKLMNOPQR
  BROWSER_SESSION_KEY_ID: xxxxxxxx

  # For session management
  JWT_SIGNING_METHOD: AAAAAAA
  JWT_SIGNING_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

  # External Services
  DEEPL_API_TOKEN: xxxxxxxxxxxxxxxxxxxxxxxxx

  # HP Photo Storage (GCS)
  # 公開範囲はバケット全体ではなく hp/ マネージドフォルダのみ
  # （allUsers への条件付き IAM は GCS では使えないため managed folder で代替）。
  # アップロード先パス hp/photos/... は server/api/hp_profile.go 側で固定。
  # バケット作成: gcloud storage buckets create gs://your-project --location=asia-northeast1 --uniform-bucket-level-access
  # 公開フォルダ: gcloud storage managed-folders create gs://your-project/hp/
  #              gcloud storage managed-folders add-iam-policy-binding gs://your-project/hp/ --member=allUsers --role=roles/storage.objectViewer
  # 書き込み権限: gcloud storage buckets add-iam-policy-binding gs://your-project --member=serviceAccount:your-project@appspot.gserviceaccount.com --role=roles/storage.objectAdmin
  GCS_HP_PHOTO_BUCKET: your-project

  # Observability（エラーアラート投稿先）
  # フロント／バックエンドの未捕捉エラーを投稿する Slack チャンネル ID。
  # dev/prod でデプロイ環境（env_variables）が分かれるため、環境ごとに別チャンネルを設定する。
  # 未設定の場合はアラート投稿を行わない（no-op）。
  SLACK_CHANNEL_ALERTS: CXXXXXXXXXX

  # Application
  APP_ICON_URL: https://drive.google.com/uc?id=xxxxxxxxxxxxxxxxxxxxxxxx
  HUB_WEBPAGE_BASE_URL: https://hub.yourdomain.com
  HUB_HELP_PAGE_URL: https://sites.google.com/view/your-public-or-private-document
  HUB_CONDITIONING_CHECK_SHEET_URL: "https://docs.google.com/forms/d/e/"
  OPENAI_API_KEY: xxxxxxxxxxx
