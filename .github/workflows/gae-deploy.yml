name: GAE Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [ main ]
  workflow_dispatch:

jobs:

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25
    - name: Get dependencies
      run: go get -v -t -d ./...
    - name: Test
      run: go test -v -cover -race

  js-test:
    name: JavaScript Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Install dependencies
      run: npm install
    - name: Lint
      run: npm run lint
    - name: Test
      run: npm test
    - name: Export Test
      run: npm run export

  gae-deploy-dev:
    name: GAE Deploy DEV
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [go-test, js-test]
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Install dependencies
      run: npm install
    - name: Export assets
      run: npm run export
    - name: Auth GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
    - name: Recover App Secrets DEV
      run: 'echo "$APP_SECRETS_DEV_YAML" > secrets.dev.yaml'
      shell: bash
      env:
        APP_SECRETS_DEV_YAML: ${{ secrets.APP_SECRETS_DEV_YAML }}
    - name: Deploy DEV
      run: gcloud app deploy ./app.dev.yaml --quiet --no-cache

  gae-deploy-prod:
    name: GAE Deploy PROD
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [go-test, js-test]
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Install dependencies
      run: npm install
    - name: Export assets
      run: npm run export
    - name: Auth GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
    - name: Recover App Secrets PROD
      run: 'echo "$APP_SECRETS_PROD_YAML" > secrets.yaml'
      shell: bash
      env:
        APP_SECRETS_PROD_YAML: ${{ secrets.APP_SECRETS_PROD_YAML }}
    - name: Deploy PROD
      run: gcloud app deploy ./app.yaml --quiet --no-cache
    - name: Deploy CRON
      run: gcloud app deploy ./cron.yaml --quiet --no-cache
    - name: Announce on Slack
      run: |
        CURRENT_TAG=${GITHUB_REF#refs/tags/}
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
        echo "[INFO] CURRENT_TAG:  ${CURRENT_TAG}"
        echo "[INFO] PREVIOUS_TAG: ${PREVIOUS_TAG}"
        COMMITS_INCLUDED=$(git log --no-merges --pretty="・ %s" ${PREVIOUS_TAG}..HEAD)
        echo "[INFO] COMMITS_INCLUDED ${COMMITS_INCLUDED}"
        curl -XPOST \
          -d "{
            \"channel\": \"tech\",
            \"text\": \"あたらしいバージョン ${CURRENT_TAG} がリリースされました！ :tada:\n${COMMITS_INCLUDED}\ngithub.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}\"
          }" \
          -H "Authorization: Bearer ${{ secrets.SLACK_BOT_USER_OAUTH_TOKEN }}" \
          -H "Content-Type: application/json" \
          https://slack.com/api/chat.postMessage
